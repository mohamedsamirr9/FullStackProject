<section class="item-details section">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h3 class="mb-0">Product Details</h3>
      <button class="btn btn-outline-secondary btn-sm" (click)="back()">← Back</button>
    </div>
    <div class="top-area">
      <div class="row align-items-center">
        <div class="col-lg-6 col-md-12 col-12">
          <div class="product-images">
            <main id="gallery">
              <div class="main-img">
                <img src="{{ product.imageUrl }}" id="current" alt="#" />
              </div>
            </main>
          </div>
        </div>
        <div class="col-lg-6 col-md-12 col-12">
          <div class="product-info">
            <h2 class="title">{{ product.name }}</h2>
            <p class="category">
              <i class="lni lni-tag"></i><a href="javascript:void(0)">{{ product.categoryName }}</a>
            </p>
            <h3 class="price">${{ product.price }}</h3>
            <p class="info-text">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
              incididunt ut labore et dolore magna aliqua.
            </p>
            <div class="row">
              <div class="col-lg-4 col-md-4 col-12">
                <div class="form-group quantity">
                  <label for="color">Quantity</label>
                  <select class="form-control" [(ngModel)]="quantity">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="bottom-content">
              <div class="row align-items-end">
                <div class="col-lg-4 col-md-4 col-12">
                  <div class="button cart-button">
                    <button class="btn" style="width: 100%" (click)="addToCart()">
                      Add to Cart
                    </button>
                  </div>
                </div>
                <div class="col-lg-4 col-md-4 col-12">
                  <div class="wish-button">
                    <button class="btn"><i class="lni lni-heart"></i> To Wishlist</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="product-details-info">
      <div class="single-block">
        <div class="row">
          <div class="col-lg-6 col-12">
            <div class="info-body custom-responsive-margin">
              <h4>Details</h4>
              <p>
                {{ product.description }}
              </p>
            </div>
          </div>
          <div class="col-lg-6 col-12"></div>
        </div>
      </div>
    </div>
  </div>
</section>
